name: build

on:
  workflow_call:
    inputs:
      language:
        description: 'Programming language of the application'
        required: true
        type: string
      node-version:
        description: 'Version of Node.js to use'
        required: false
        type: string
      typescript-framework:
        description: 'Framework for the Node.js application (e.g., angular, react)'
        required: false
        type: string
      dotnet-version:
        description: 'Version of .NET to use'
        required: false
        type: string
      dotnet-selfcontained:
        description: 'Whether to build .NET application as self-contained'
        required: false
        type: boolean
        default: false
      source-encoding:
        description: 'Source encoding for the SonarQube project (default: UTF-8)'
        required: false
        type: string
        default: 'UTF-8'
      deployment-type:
        description: 'Type of deployment (e.g., docker, kubernetes, etc.)'
        required: true
        type: string
      deployment-name:
        description: "Name of application to be deployed (e.g., myapp)."
        required: false
        type: string
        default: '${{ vars.DEPLOYMENT_NAME }}'
    outputs:
      package-name:
        description: 'Name of the package generated by the package step'
        value: ${{ jobs.package.outputs.package-name }}
      package-extension:
        description: 'Extension of the package generated by the package step'
        value: ${{ jobs.package.outputs.package-extension }}
      release-version:
        description: 'Version of the release generated by the package step'
        value: ${{ jobs.package.outputs.release-version }}

jobs:
  code-review:
    uses: ./.github/workflows/code-review.yml
    with:
      language: ${{ inputs.language }}    

  package:
    needs:
      - code-review
    runs-on:
      group: Default
      labels: ${{ vars.RUNNER_BUILD_LABEL }}
    steps:
      # --- Sanitize (Windows)
      - name: Sanitize git extraheaders (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          function Ignore { if ($LASTEXITCODE -ne 0) { $global:LASTEXITCODE = 0 } }
          git --version; Ignore
          git config --global --unset-all http.https://github.com/.extraheader; Ignore
          git config --system --unset-all http.https://github.com/.extraheader; Ignore
          Remove-Item Env:\GIT_HTTP_EXTRAHEADER -ErrorAction SilentlyContinue
          [Environment]::SetEnvironmentVariable("GIT_HTTP_EXTRAHEADER",$null,"User")

      # --- Sanitize (Linux/macOS)
      - name: Sanitize git extraheaders (bash)
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          git --version || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --system --unset-all http.https://github.com/.extraheader || true
          unset GIT_HTTP_EXTRAHEADER || true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Build the application
        id: package
        uses: mario-fribla-gonzalez/reuse-build-action@main
        with:
          language: ${{ inputs.language }}
          node-version: ${{ inputs.node-version }}
          typescript-framework: ${{ inputs.typescript-framework }}
          dotnet-version: ${{ inputs.dotnet-version }}
          dotnet-selfcontained: ${{ inputs.dotnet-selfcontained }}
          command: build
          coberturapruebasunitarias: ${{ vars.COBERTURA_PRUEBAS_UNITARIAS }}

      # === Crear/ubicar el paquete taggeado y generar alias plano (Windows, tolerante)
      - name: Create plain package alias (Windows)
        id: make_plain_alias_win
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: |
          $pkg='${{ steps.package.outputs.package-name }}'
          $rel='${{ steps.package.outputs.release-version }}'
          $ext='${{ steps.package.outputs.package-extension }}'
          Write-Output "Version de variable rel es :$rel"
          if ([string]::IsNullOrWhiteSpace($pkg) -or [string]::IsNullOrWhiteSpace($rel) -or [string]::IsNullOrWhiteSpace($ext)) {
            throw "Faltan outputs del build (package-name/release-version/package-extension)"
          }

          $tag = $rel.TrimStart('v')

          $candidates = @(
            "$pkg-$rel.$ext",
            "$pkg-v$tag.$ext",
            "$pkg-$tag.$ext",
            "release/$pkg-$rel.$ext",
            "release/$pkg-v$tag.$ext",
            "release/$pkg-$tag.$ext"
          )
          $plainCandidates = @("$pkg.$ext","release/$pkg.$ext")

          Write-Host "Buscando paquete taggeado en candidatos:"
          $candidates | ForEach-Object { Write-Host " - $_" }

          $tagged = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) { $tagged = (Resolve-Path $c).Path; break }
          }

          if (-not $tagged) {
            # ¿Existe el plano? lo usamos para crear el taggeado
            $plainSrc = $null
            foreach ($p in $plainCandidates) { if (Test-Path $p) { $plainSrc = (Resolve-Path $p).Path; break } }

            if ($plainSrc) {
              New-Item -ItemType Directory -Path "release" -Force | Out-Null
              $tagged = (Resolve-Path "release").Path + "\$pkg-$rel.$ext"
              Copy-Item $plainSrc $tagged -Force
              Write-Host "No encontré zip taggeado, pero había plano. Creado taggeado desde plano: $tagged"
            } else {
              # ÚLTIMO recurso: glob
              $glob = Get-ChildItem -Recurse -Filter "$pkg-*.${ext}" | Select-Object -First 1
              if ($glob) {
                $tagged = $glob.FullName
                Write-Host "Usando primer zip encontrado por glob: $tagged"
              } else {
                $msg = "Tagged package not found. Candidatos:`n" + ($candidates -join "`n") + "`nTampoco se encontró plano."
                throw $msg
              }
            }
          }

          $dir   = Split-Path $tagged
          $plain = Join-Path $dir "$pkg.$ext"
          Copy-Item $tagged $plain -Force

          Write-Host "Tagged: $tagged"
          Write-Host "Plain : $plain"

          "file_tagged=$tagged" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "file_plain=$plain"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # === Crear/ubicar el paquete taggeado y generar alias plano (Linux/macOS, tolerante)
      - name: Create plain package alias (bash)
        id: make_plain_alias_nix
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          pkg='${{ steps.package.outputs.package-name }}'
          rel='${{ steps.package.outputs.release-version }}'
          ext='${{ steps.package.outputs.package-extension }}'

          [ -n "$pkg" ] && [ -n "$rel" ] && [ -n "$ext" ] || { echo "Faltan outputs del build"; exit 1; }

          tag="${rel#v}"

          candidates=(
            "${pkg}-${rel}.${ext}"
            "${pkg}-v${tag}.${ext}"
            "${pkg}-${tag}.${ext}"
            "release/${pkg}-${rel}.${ext}"
            "release/${pkg}-v${tag}.${ext}"
            "release/${pkg}-${tag}.${ext}"
          )
          plain_candidates=("${pkg}.${ext}" "release/${pkg}.${ext}")

          echo "Buscando paquete taggeado en candidatos:"
          for c in "${candidates[@]}"; do echo " - $c"; done

          tagged=""
          for c in "${candidates[@]}"; do
            if [ -f "$c" ]; then tagged="$(realpath "$c")"; break; fi
          done

          if [ -z "$tagged" ]; then
            # ¿Existe el plano? lo usamos para crear el taggeado
            plain_src=""
            for p in "${plain_candidates[@]}"; do
              if [ -f "$p" ]; then plain_src="$(realpath "$p")"; break; fi
            done

            if [ -n "$plain_src" ]; then
              mkdir -p release
              tagged="$(realpath release)/${pkg}-${rel}.${ext}"
              cp -f "$plain_src" "$tagged"
              echo "No encontré zip taggeado, pero había plano. Creado taggeado desde plano: $tagged"
            else
              # ÚLTIMO recurso: glob
              set +e
              first=$(find . -type f -name "${pkg}-*.${ext}" | head -n 1)
              set -e
              if [ -n "$first" ]; then
                tagged="$(realpath "$first")"
                echo "Usando primer zip encontrado por glob: $tagged"
              else
                echo "Tagged package not found. Candidatos:"
                printf "%s\n" "${candidates[@]}"
                echo "Tampoco se encontró plano."
                exit 1
              fi
            fi
          fi

          dir="$(dirname "$tagged")"
          plain="${dir}/${pkg}.${ext}"
          cp -f "$tagged" "$plain"

          echo "file_tagged=${tagged}" >> "$GITHUB_OUTPUT"
          echo "file_plain=${plain}"   >> "$GITHUB_OUTPUT"
          echo "Tagged: $tagged"
          echo "Plain : $plain"

      # === Copiar ambos archivos a la RAÍZ del workspace (para que los jobs de deploy los encuentren)
      - name: Copy artifacts to workspace root (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: |
          $tagged = "${{ steps.make_plain_alias_win.outputs.file_tagged || steps.make_plain_alias_nix.outputs.file_tagged }}"
          $plain  = "${{ steps.make_plain_alias_win.outputs.file_plain   || steps.make_plain_alias_nix.outputs.file_plain }}"
          Copy-Item $tagged . -Force
          Copy-Item $plain  . -Force
          Write-Host "Root copies ready: $(Resolve-Path .\$(Split-Path $tagged -Leaf)), $(Resolve-Path .\$(Split-Path $plain -Leaf))"

      - name: Copy artifacts to workspace root (bash)
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          tagged="${{ steps.make_plain_alias_win.outputs.file_tagged || steps.make_plain_alias_nix.outputs.file_tagged }}"
          plain="${{ steps.make_plain_alias_win.outputs.file_plain   || steps.make_plain_alias_nix.outputs.file_plain }}"
          cp -f "$tagged" .
          cp -f "$plain"  .
          echo "Root copies ready: ./$(basename "$tagged"), ./$(basename "$plain")"

      # === Subir artifact 'assets' desde la RAÍZ (plano + taggeado), sobrescribiendo si ya existe
      - name: Upload artifacts (root-level files)
        uses: actions/upload-artifact@v4
        with:
          name: assets
          path: |
            ./${{ steps.package.outputs.package-name }}.${{ steps.package.outputs.package-extension }}
            ./${{ steps.package.outputs.package-name }}-${{ steps.package.outputs.release-version }}.${{ steps.package.outputs.package-extension }}
          overwrite: true
          if-no-files-found: error

    outputs:
      package-name: ${{ steps.package.outputs.package-name }}
      package-extension: ${{ steps.package.outputs.package-extension }}
      release-version: ${{ steps.package.outputs.release-version }}

  test-unitario:
    if: ${{ vars.ACTIVAR_TEST_UNITARIO == 'true' && inputs.language == 'dotnet' }} # false:Desactiva true:Activa
    needs:
      - package
    runs-on:
      group: Default
      labels: ${{ vars.RUNNER_BUILD_LABEL }}
    steps:
      # --- Sanitize (Windows)
      - name: Sanitize git extraheaders (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          function Ignore { if ($LASTEXITCODE -ne 0) { $global:LASTEXITCODE = 0 } }
          git --version; Ignore
          git config --global --unset-all http.https://github.com/.extraheader; Ignore
          git config --system --unset-all http.https://github.com/.extraheader; Ignore
          Remove-Item Env:\GIT_HTTP_EXTRAHEADER -ErrorAction SilentlyContinue
          [Environment]::SetEnvironmentVariable("GIT_HTTP_EXTRAHEADER",$null,"User")

      # --- Sanitize (Linux/macOS)
      - name: Sanitize git extraheaders (bash)
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          git --version || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --system --unset-all http.https://github.com/.extraheader || true
          unset GIT_HTTP_EXTRAHEADER || true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Test the application
        uses: mario-fribla-gonzalez/reuse-build-action@main
        with:
          language: ${{ inputs.language }}
          node-version: ${{ inputs.node-version }}
          typescript-framework: ${{ inputs.typescript-framework }}
          dotnet-version: ${{ inputs.dotnet-version }}
          dotnet-selfcontained: ${{ inputs.dotnet-selfcontained }}
          command: test
          coberturapruebasunitarias: ${{ vars.COBERTURA_PRUEBAS_UNITARIAS }}

  sonarqube:
    #if: always()
    needs:
      - package
    uses: ./.github/workflows/sonarqube.yml
    with:
      release-version: ${{ needs.package.outputs.release-version }}
      language: ${{ inputs.language }}
      sonar-source-encoding: ${{ inputs.source-encoding }}
    secrets: inherit
